name: Build and Publish Package

# Reusable workflow template for building and publishing a WarmShower OS package.
# Call this from a package-specific workflow using:
#
#   jobs:
#     publish:
#       uses: Warm-shower/warmshower-pkgbuilds/.github/workflows/build-and-publish.yml@master
#       with:
#         package_dir: warmshower-settings-pkg
#       secrets: inherit

on:
  workflow_call:
    inputs:
      package_dir:
        description: "Subdirectory containing the PKGBUILD"
        required: true
        type: string
      arch:
        description: "Target architecture"
        required: false
        default: "x86_64"
        type: string
    secrets:
      WS_SIGNING_KEY:
        required: true
      WS_SIGNING_KEY_PASSPHRASE:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      R2_ACCOUNT_ID:
        required: true
      R2_BUCKET:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    outputs:
      package_files: ${{ steps.find_packages.outputs.files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chmod -R a+rw .

      - name: Build package
        run: |
          cd "${{ inputs.package_dir }}"
          sudo -H -u builder makepkg --syncdeps --noconfirm

      - name: Find built packages
        id: find_packages
        run: |
          FILES=$(find "${{ inputs.package_dir }}" -name "*.pkg.tar.zst" | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Import WarmShower signing key
        env:
          WS_SIGNING_KEY: ${{ secrets.WS_SIGNING_KEY }}
          WS_SIGNING_KEY_PASSPHRASE: ${{ secrets.WS_SIGNING_KEY_PASSPHRASE }}
        run: |
          echo "$WS_SIGNING_KEY" | gpg --batch --import
          echo "$WS_SIGNING_KEY_PASSPHRASE" | gpg --batch --passphrase-fd 0 \
            --pinentry-mode loopback --sign /dev/null 2>/dev/null || true

      - name: Sign packages
        env:
          WS_SIGNING_KEY_PASSPHRASE: ${{ secrets.WS_SIGNING_KEY_PASSPHRASE }}
        run: |
          for pkg in ${{ steps.find_packages.outputs.files }}; do
            gpg --batch \
                --passphrase "$WS_SIGNING_KEY_PASSPHRASE" \
                --pinentry-mode loopback \
                --detach-sign --no-armor "$pkg"
            echo "Signed: $pkg"
          done

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_dir }}-packages
          path: |
            ${{ inputs.package_dir }}/*.pkg.tar.zst
            ${{ inputs.package_dir }}/*.pkg.tar.zst.sig

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish on push to master (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package_dir }}-packages
          path: packages/

      - name: Publish to WarmShower R2 repository
        # Uses the r2-publish reusable workflow.
        # All credentials come from GitHub org-level secrets — nothing is hardcoded.
        # The public repository URL is configured via WS_PACKAGE_REPOSITORY (GitHub variable).
        # To switch from the temporary R2 endpoint to repo.warmshower.ai:
        # update WS_PACKAGE_REPOSITORY in GitHub org variables — no code changes needed.
        # See: docs/cloudflare-r2-setup.md for full setup instructions.
        uses: ./.github/workflows/r2-publish.yml
        with:
          package_dir: packages/
          arch: ${{ inputs.arch }}
        secrets: inherit
