name: Package Bug Report
description: Report a broken or misbehaving WarmShower OS package
title: "[BUG] <package-name>: <short description>"
labels: ["bug", "needs-triage"]

body:
  - type: input
    id: package_name
    attributes:
      label: Package Name
      placeholder: e.g. warmshower-kernel-manager
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: Installed Package Version
      description: Output of `pacman -Q <package-name>`
      placeholder: e.g. warmshower-kernel-manager 2.1.3-1
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Install package
        2. Run ...
        3. See error
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Output
      render: shell
    validations:
      required: false

  - type: input
    id: kernel_version
    attributes:
      label: Kernel Version
      description: Output of `uname -r`
    validations:
      required: false
